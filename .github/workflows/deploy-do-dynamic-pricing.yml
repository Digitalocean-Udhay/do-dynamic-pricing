# Pushes do-dynamic-pricing/ to branch gh-pages so Pages can use "Deploy from a branch".
# (Artifact-based Pages often 404s on org repos until Actions + environments are fully approved.)
name: Deploy site to gh-pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy do-dynamic-pricing to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: do-dynamic-pricing
          clean: true
